name: CI

on:
  push:
    branches: [main]
  pull_request:

# Percorso unico per i browser Playwright: identico su Linux e Windows,
# cosi la cache funziona allo stesso modo sui due runner.
env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

jobs:
  ci:
    name: ci
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: pnpm worker:install

      - name: Format check
        run: pnpm format:check

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: File size audit
        run: pnpm audit:size

      - name: UI language audit
        run: pnpm audit:ui-language

      - name: Lint worker (ruff + mypy)
        run: pnpm --filter @dm-instamap/worker lint

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Test worker
        run: pnpm --filter @dm-instamap/worker test

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright browsers (Windows)
        if: runner.os == 'Windows'
        run: pnpm exec playwright install chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
